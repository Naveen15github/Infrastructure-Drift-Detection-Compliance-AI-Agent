name: Terraform Drift Detection
# Runs every 15 minutes to detect infrastructure drift
# Updated: 2026-06-15 - Added debug logging

on:
  schedule:
    - cron: "*/15 * * * *"   # Every 15 minutes (reliable on GitHub free tier)
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual trigger"
        required: false
        default: "Manual drift check"

concurrency:
  group: terraform-drift
  cancel-in-progress: false

jobs:
  drift-detection:
    name: Drift Detection
    runs-on: ubuntu-latest

    permissions:
      id-token: write   # Required for OIDC authentication with AWS
      contents: read

    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      AWS_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
      
      - name: Verify checkout commit
        run: |
          echo "Current commit SHA: $(git rev-parse HEAD)"
          echo "Current commit message: $(git log -1 --pretty=%B)"
          echo "Listing agent files to verify latest code:"
          head -20 agent/graph.py

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"
          terraform_wrapper: false  # Disable wrapper to get real terraform exit codes

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          # Fallback to static credentials if OIDC role not configured
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      
      - name: Debug - Check actual AWS resources
        run: |
          echo "=== Checking EC2 instance state ==="
          aws ec2 describe-instances --instance-ids i-0093b8cde7603a295 --region us-east-1 --query "Reservations[0].Instances[0].[InstanceType,State.Name]" --output text
          echo "=== Checking Security Group rules ==="
          aws ec2 describe-security-groups --group-ids sg-065cb61b64417f1a4 --region us-east-1 --query "SecurityGroups[0].IpPermissions[*].[IpProtocol,FromPort,ToPort,IpRanges[0].CidrIp]" --output text
          echo "=== Checking S3 state file timestamp ==="
          aws s3api head-object --bucket terraform-state-drift-agent-478468758108 --key drift-agent/terraform.tfstate --query 'LastModified' --output text

      - name: Install Python dependencies
        run: pip install -r requirements.txt
      
      - name: Debug - Check environment variables
        run: |
          echo "Checking if GROQ_API_KEY is set..."
          if [ -z "$GROQ_API_KEY" ]; then
            echo "ERROR: GROQ_API_KEY is NOT set!"
          else
            echo "SUCCESS: GROQ_API_KEY is set (length: ${#GROQ_API_KEY} characters)"
            echo "First 10 chars: ${GROQ_API_KEY:0:10}..."
          fi
          echo "Checking if SLACK_WEBHOOK_URL is set..."
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "ERROR: SLACK_WEBHOOK_URL is NOT set!"
          else
            echo "SUCCESS: SLACK_WEBHOOK_URL is set"
          fi
      
      - name: Test terraform plan exit code directly
        id: terraform_test
        continue-on-error: true
        working-directory: terraform
        run: |
          echo "Running terraform plan -detailed-exitcode..."
          terraform plan -detailed-exitcode -out=tfplan
          EXIT_CODE=$?
          echo "Terraform plan exit code: $EXIT_CODE"
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          exit 0  # Don't fail the workflow

      - name: Run drift detection agent
        run: python -m agent.graph
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
          AWS_DEFAULT_REGION: us-east-1
          TERRAFORM_DIR: terraform

      - name: Upload Terraform plan artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ github.run_id }}
          path: terraform/tfplan
          if-no-files-found: ignore
          retention-days: 30
